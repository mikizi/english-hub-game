<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hebrew-English vocabulary practice game with spelling, quizzes, memory matching, and test word lists.">
  <meta name="theme-color" content="#120f2c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="English Hub">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>האב אנגלית</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=block" rel="stylesheet">
  <style>
    body.is-loading .app-content { visibility: hidden; }
    body.is-loading { overflow: hidden; }
  </style>
  <link rel="stylesheet" href="src/styles.css?v=glass-5">
</head>
<body class="min-h-screen flex flex-col is-loading">
  <div id="app-loader" class="app-loader" role="status" aria-live="polite" aria-label="טוען">
    <div class="app-loader-inner glass-card">
      <div class="app-loader-spinner" aria-hidden="true"></div>
      <p class="font-headline text-lg font-bold text-white">האב אנגלית</p>
      <p class="text-on-surface-variant text-sm">טוען...</p>
    </div>
  </div>
  <div class="app-content">
  <div class="nebula-bg" aria-hidden="true"></div>
  <span class="particle w-1 h-1 top-1/4 left-10" aria-hidden="true"></span>
  <span class="particle w-2 h-2 top-1/2 left-1/4 opacity-20" style="background: rgba(139,220,0,0.35)" aria-hidden="true"></span>
  <span class="particle w-1.5 h-1.5 bottom-1/3 right-10 opacity-20" style="background: rgba(0,224,255,0.35)" aria-hidden="true"></span>
  <span class="particle w-1 h-1 top-20 right-1/4" aria-hidden="true"></span>

  <header class="app-header fixed top-0 inset-x-0 z-[100]">
    <div class="app-header__inner">
      <button type="button" class="flex items-center gap-2 cursor-pointer text-right shrink-0" data-screen="home" aria-label="חזרה למסך הבית">
        <span class="w-10 h-10 glass-card rounded-xl flex items-center justify-center text-accent shadow-[0_0_16px_rgba(139,220,0,0.25)]">
          <span class="material-symbols-outlined msi-md msi-filled" aria-hidden="true">home</span>
        </span>
      </button>
      <h2 class="font-headline text-lg font-bold text-white tracking-tight">האב אנגלית</h2>
      <div class="flex items-center gap-2 shrink-0">
        <button type="button" data-screen="admin" class="text-on-surface-variant hover:text-white font-medium transition-colors flex items-center gap-1 text-sm" aria-label="ניהול">
          <span class="material-symbols-outlined msi-md" aria-hidden="true">settings</span>
          <span class="hidden sm:inline">ניהול</span>
        </button>
        <div class="glass-card px-3 py-1.5 rounded-full flex items-center gap-2">
          <span class="text-[10px] text-on-surface-variant font-bold uppercase tracking-wide">ניקוד</span>
          <span class="text-accent font-black text-lg leading-none" id="global-score">0</span>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main flex-1 w-full">
    <section id="screen-home" class="screen animate-in fade-in duration-500">
      <header class="text-center mb-8">
        <h1 class="font-headline text-2xl md:text-4xl font-extrabold text-white mb-2">מוכנים ללמוד?</h1>
        <p class="text-on-surface-variant text-sm md:text-base max-w-md mx-auto">בחר את שיטת התרגול המועדפת עליך והתחל לשבור שיאים.</p>
      </header>

      <div class="space-y-4">
        <button type="button" data-mode="spelling" class="home-mode-card home-mode-card--spelling spotify-card w-full text-right group rounded-xl p-4 flex items-center gap-4 cursor-pointer">
          <span class="home-mode-icon w-16 h-16 shrink-0 rounded-lg flex items-center justify-center relative overflow-hidden">
            <span class="material-symbols-outlined msi-2xl msi-filled" aria-hidden="true">edit_note</span>
          </span>
          <span class="flex-1 min-w-0">
            <span class="block font-headline text-base font-bold text-white mb-0.5">אימון כתיבה</span>
            <span class="block text-on-surface-variant text-xs leading-snug">תרגל איות כדי לשרוד את השלב.</span>
          </span>
          <span class="home-mode-chevron w-8 h-8 flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined msi-lg" aria-hidden="true">chevron_left</span>
          </span>
        </button>

        <button type="button" data-mode="quiz" class="home-mode-card home-mode-card--quiz spotify-card w-full text-right group rounded-xl p-4 flex items-center gap-4 cursor-pointer">
          <span class="home-mode-icon w-16 h-16 shrink-0 rounded-lg flex items-center justify-center relative overflow-hidden">
            <span class="material-symbols-outlined msi-2xl msi-filled" aria-hidden="true">bolt</span>
          </span>
          <span class="flex-1 min-w-0">
            <span class="block font-headline text-base font-bold text-white mb-0.5">בחירה מהירה</span>
            <span class="block text-on-surface-variant text-xs leading-snug">מרוץ נגד הזמן עם בחירה מרובה.</span>
          </span>
          <span class="home-mode-chevron w-8 h-8 flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined msi-lg" aria-hidden="true">chevron_left</span>
          </span>
        </button>

        <button type="button" data-mode="memory" class="home-mode-card home-mode-card--memory spotify-card w-full text-right group rounded-xl p-4 flex items-center gap-4 cursor-pointer">
          <span class="home-mode-icon w-16 h-16 shrink-0 rounded-lg flex items-center justify-center relative overflow-hidden">
            <span class="material-symbols-outlined msi-2xl msi-filled" aria-hidden="true">style</span>
          </span>
          <span class="flex-1 min-w-0">
            <span class="block font-headline text-base font-bold text-white mb-0.5">משחק זיכרון</span>
            <span class="block text-on-surface-variant text-xs leading-snug">התאם מילים וקלפים בדו-קרב זיכרון.</span>
          </span>
          <span class="home-mode-chevron w-8 h-8 flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined msi-lg" aria-hidden="true">chevron_left</span>
          </span>
        </button>
      </div>

    </section>

    <section id="screen-admin" class="screen admin-screen hidden animate-in slide-in-from-bottom duration-500">
      <div class="admin-screen__header flex justify-between items-start gap-4 mb-6 md:mb-8">
        <div>
          <h2 class="font-headline text-3xl md:text-4xl font-extrabold text-white mb-2">ניהול והגדרות</h2>
          <p class="text-on-surface-variant text-sm md:text-base">התאם את חווית הלמידה בדיוק בשבילך.</p>
        </div>
        <button type="button" data-screen="home" class="btn-ghost w-11 h-11 rounded-full flex items-center justify-center shrink-0" aria-label="סגור">
          <span class="material-symbols-outlined msi-md" aria-hidden="true">close</span>
        </button>
      </div>

      <div class="admin-settings-grid mb-6 md:mb-8">
        <label class="admin-panel-card admin-settings-grid__list p-5 md:p-6 rounded-2xl flex flex-col gap-3">
          <span>
            <span class="block font-bold text-white">רשימת מילים</span>
            <span class="block text-xs text-on-surface-variant mt-1">הרשימה לתרגול, מבחנים ומשחק זיכרון — נשמרת לביקורים הבאים</span>
          </span>
          <select id="word-list-select" class="admin-input font-bold text-base"></select>
          <p id="word-list-description" class="text-on-surface-variant font-medium text-sm">טוען רשימות...</p>
          <a id="word-list-reference" href="#" target="_blank" rel="noopener" class="hidden link-accent font-bold inline-flex items-center gap-2 text-sm">
            פתח חומר עזר
          </a>
        </label>

        <label class="admin-panel-card p-5 rounded-2xl flex items-center gap-4 cursor-pointer">
          <span class="relative inline-flex items-center">
            <input type="checkbox" id="settings-show-icons" class="sr-only peer" data-setting="showIcons">
            <span class="toggle-track w-14 h-7 rounded-full peer-checked:bg-[#8bdc00] after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:after:-translate-x-full"></span>
          </span>
          <span>
            <span class="block font-bold text-white">הצג אימוג'ים במשחק</span>
            <span class="block text-xs text-on-surface-variant mt-0.5">הצג או הסתר את האייקונים החזותיים</span>
          </span>
        </label>

        <label class="admin-panel-card p-5 rounded-2xl flex items-center gap-4 cursor-pointer">
          <span class="relative inline-flex items-center">
            <input type="checkbox" id="settings-show-ghost" class="sr-only peer" data-setting="showGhost">
            <span class="toggle-track w-14 h-7 rounded-full peer-checked:bg-[#8bdc00] after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:after:-translate-x-full"></span>
          </span>
          <span>
            <span class="block font-bold text-white">הצג רמז כתיבה (Ghost Text)</span>
            <span class="block text-xs text-on-surface-variant mt-0.5">הצג את המילה באנגלית ברקע בזמן ההכתבה</span>
          </span>
        </label>
      </div>

      <form id="add-word-form" class="admin-panel-card admin-add-form p-6 md:p-8 rounded-2xl mb-6 md:mb-8">
        <div class="admin-add-form__grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
          <div class="space-y-2">
            <label for="add-en" class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">English</label>
            <input type="text" id="add-en" class="admin-input" placeholder="למשל: Summer" required>
          </div>
          <div class="space-y-2">
            <label for="add-he" class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">פירוש</label>
            <input type="text" id="add-he" class="admin-input" placeholder="למשל: קיץ" required>
          </div>
          <div class="space-y-2">
            <label for="add-icon" class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">Emoji (אופציונלי)</label>
            <input type="text" id="add-icon" class="admin-input" placeholder="☀️">
          </div>
          <div class="flex flex-col justify-end">
            <button type="submit" class="btn-spotify h-[52px] text-base w-full">הוסף לרשימה</button>
          </div>
        </div>
        <label class="mt-5 flex items-center gap-4 glass-card p-4 rounded-xl w-fit cursor-pointer">
          <span class="relative inline-flex items-center">
            <input type="checkbox" id="add-mustSpell" class="sr-only peer">
            <span class="toggle-track w-11 h-6 rounded-full peer-checked:bg-[#8bdc00] after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:-translate-x-full"></span>
          </span>
          <span class="text-sm font-medium text-on-surface-variant">חובה לדעת לאיית (יופיע באימון כתיבה)</span>
        </label>
      </form>

      <div class="admin-word-list" id="admin-word-list"></div>
    </section>

    <section id="screen-spelling" class="screen game-screen hidden text-center max-w-3xl mx-auto w-full">
      <div class="game-panel w-full">
      <div class="mb-8">
        <div id="spell-icon" class="text-8xl mb-6 drop-shadow-[0_0_24px_rgba(139,220,0,0.15)]"></div>
        <h2 id="spell-he" class="font-headline text-4xl md:text-6xl font-extrabold text-white mb-3"></h2>
        <p class="text-on-surface-variant font-medium">איך כותבים את זה באנגלית?</p>
      </div>

      <div class="relative mb-8">
        <input type="text" id="spell-input" autocomplete="off" autocapitalize="characters" enterkeyhint="done" inputmode="text" class="w-full bg-transparent border-b-4 border-white/10 text-4xl md:text-6xl font-black text-center focus:outline-none focus:border-[#8bdc00] uppercase tracking-[0.15em] pb-5 relative z-10 transition-all font-headline">
        <div id="spell-ghost" class="ghost-text text-4xl md:text-6xl font-black uppercase font-headline"></div>
      </div>

      <div class="flex flex-col items-stretch gap-3 max-w-sm mx-auto">
        <button type="button" id="spell-submit" class="btn-spotify text-lg py-4 min-h-[52px]">
          בדוק תשובה
        </button>
        <button type="button" id="speak-current-word" class="btn-ghost p-4 rounded-2xl group flex items-center justify-center gap-2" aria-label="השמע מילה">
          <span class="material-symbols-outlined msi-lg text-accent group-hover:scale-110 transition-transform" aria-hidden="true">volume_up</span>
          <span class="font-medium text-on-surface-variant">השמע שוב</span>
        </button>
      </div>
      </div>
    </section>

    <section id="screen-quiz" class="screen game-screen hidden quiz-screen text-center mx-auto w-full">
      <div class="quiz-layout">
        <div class="quiz-prompt glass-card p-5 rounded-2xl">
          <div id="quiz-icon" class="quiz-prompt-icon text-4xl mb-2"></div>
          <h2 id="quiz-en" class="font-headline text-3xl font-extrabold uppercase tracking-tight text-white mb-1"></h2>
          <p class="quiz-prompt-hint text-on-surface-variant font-medium text-sm uppercase tracking-wide">מה הפירוש הנכון?</p>
        </div>
        <div class="quiz-answers">
          <div id="quiz-options" class="quiz-options grid grid-cols-2 gap-2"></div>
          <div id="quiz-feedback" class="quiz-feedback hidden" aria-live="polite">
            <p id="quiz-feedback-title" class="quiz-feedback-title font-bold text-red-400 text-lg mb-2">לא נכון</p>
            <p id="quiz-feedback-answer" class="quiz-feedback-answer text-white font-bold text-xl mb-4"></p>
            <button type="button" id="quiz-next" class="btn-spotify w-full text-lg py-4 min-h-[52px]">המילה הבאה</button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-results" class="screen hidden text-center max-w-lg mx-auto py-6 md:py-10 w-full">
      <div class="glass-card rounded-2xl p-8 md:p-10">
        <p id="results-icon" class="text-6xl mb-4">📊</p>
        <h2 id="results-title" class="font-headline text-3xl md:text-4xl font-extrabold text-white mb-2">סיימת את המבחן!</h2>
        <p id="results-grade" class="text-5xl md:text-6xl font-black text-accent mb-2"></p>
        <p id="results-summary" class="text-on-surface-variant font-bold text-lg mb-2"></p>
        <p id="results-detail" class="text-on-surface-variant text-sm mb-8"></p>
        <button type="button" data-screen="home" class="btn-spotify w-full text-lg py-4">חזרה לבית</button>
      </div>
    </section>

    <section id="screen-memory" class="screen game-screen hidden max-w-5xl mx-auto w-full">
      <header class="memory-header flex flex-row justify-between items-center gap-3 shrink-0 mb-2">
        <h2 class="font-headline text-xl md:text-2xl font-extrabold text-white">משחק זיכרון</h2>
        <p class="text-on-surface-variant font-medium text-sm" id="memory-progress">מצאת 0 מתוך 0 זוגות</p>
      </header>
      <div class="memory-board">
        <div id="memory-grid" class="memory-grid"></div>
      </div>
    </section>
  </main>

  <footer class="app-footer fixed bottom-0 inset-x-0 z-[100] p-4">
    <div class="max-w-lg mx-auto flex items-center gap-4">
      <div id="player-indicator-icon" class="w-12 h-12 glass-card rounded-xl flex items-center justify-center text-2xl shrink-0">⭐</div>
      <div class="flex-1 min-w-0">
        <div class="flex justify-between gap-3 mb-1.5">
          <span id="player-indicator-text" class="font-headline font-bold text-white text-xs truncate">מוכן לתרגול</span>
          <span id="progress-percent" class="text-accent-cyan font-bold text-sm shrink-0">0%</span>
        </div>
        <div class="h-2.5 bg-[#0d0a27] rounded-full overflow-hidden">
          <div id="global-progress" class="progress-fill h-full w-0 transition-all duration-700 ease-out rounded-full"></div>
        </div>
      </div>
    </div>
  </footer>

  </div>
  <script src="src/boot.js?v=glass-4b"></script>
  <script src="src/app.js?v=routes-1"></script>
</body>
</html>
